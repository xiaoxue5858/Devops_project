apiVersion: apps/v1
 kind: Deployment
 metadata:
   name: nginx-green
 spec:
   replicas: 2
   selector:
     matchLabels:
       app: nginx
       version: green
   template:
     metadata:
       labels:
         app: nginx
         version: green
     spec:
       containers:
       - name: nginx
         image: registry.cn-hangzhou.aliyuncs.com/xxx/nginx:v2
         ports:
         - containerPort: 80 
         resources:
           requests:
             cpu: "100m"
             memory: "128Mi"
           limits:
             cpu: "500m"
             memory: "256Mi"
