apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      version: blue
  template:
    metadata:
      labels:
        app: nginx
        version: blue
    spec:
      containers:
      - name: nginx
        image: registry.cn-hangzhou.aliyuncs.com/xd/nginx:v1
        ports:
        - containerPort: 80
        resources:
           requests:
             cpu: "100m"
             memory: "128Mi"
           limits:
             cpu: "500m"

